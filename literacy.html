        }

        .question-text {

            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .name-input {

            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #2196F3;
            margin-top: 10px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option input[type="radio"] {
            margin-right: 12px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .option label {
            cursor: pointer;
            flex: 1;
            font-size: 16px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .results {
            display: none;
            padding: 30px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 30px;
        }

        .results.show {
            display: block;
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .score.pass {
            background: #d4edda;
            color: #155724;
        }

        .score.fail {
            background: #f8d7da;
            color: #721c24;
        }

        .answer-review {
            margin-top: 20px;
        }

        .answer-item {
            padding: 20px;
            background: white;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #ccc;
        }

        .answer-item.correct {
            border-left-color: #28a745;
            background: #f1f9f3;
        }

        .answer-item.incorrect {
            border-left-color: #dc3545;
            background: #fdf3f4;
        }

        .answer-label {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 16px;
        }

            margin: 5px 0;
            font-size: 15px;

            color: white;
            border: none;

            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;

            width: 100%;

        // Function to shuffle array and pick random questions
        function getRandomQuestions(allQuestions, count) {
            const questionKeys = Object.keys(allQuestions);
            const shuffled = questionKeys.sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        // Get 25 random questions
        const selectedQuestionIds = getRandomQuestions(allQuestions, 25);
        const selectedQuestions = {};
        selectedQuestionIds.forEach(id => {
            selectedQuestions[id] = allQuestions[id];
        });

        // Generate questions HTML
        const questionsContainer = document.getElementById('questionsContainer');
        let questionNumber = 1;

        selectedQuestionIds.forEach(questionId => {
            const q = allQuestions[questionId];
            const questionHTML = `
                <div class="question">
                    <div class="question-text">${questionNumber}. ${q.text}</div>
                    <div class="options">
                        <div class="option">
                            <input type="radio" name="${questionId}" value="a" id="${questionId}a">
                            <label for="${questionId}a">${q.options.a}</label>
                        </div>
                        <div class="option">
                            <input type="radio" name="${questionId}" value="b" id="${questionId}b">
                            <label for="${questionId}b">${q.options.b}</label>
                        </div>
                        <div class="option">
                            <input type="radio" name="${questionId}" value="c" id="${questionId}c">
                            <label for="${questionId}c">${q.options.c}</label>
                        </div>
                        <div class="option">
                            <input type="radio" name="${questionId}" value="d" id="${questionId}d">
                            <label for="${questionId}d">${q.options.d}</label>
                        </div>
                    </div>
                </div>
            `;
            questionsContainer.innerHTML += questionHTML;
            questionNumber++;
        });

        // Form submission handler
        document.getElementById('testForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            let score = 0;
            let totalQuestions = selectedQuestionIds.length;
            let reviewHTML = '<h2 style="margin-bottom: 20px; color: #333;">Answer Review</h2>';
            let incorrectAnswers = [];

            selectedQuestionIds.forEach(questionId => {
                const q = allQuestions[questionId];
                const selected = document.querySelector(`input[name="${questionId}"]:checked`);
                const userAnswer = selected ? selected.value : null;

                const isCorrect = userAnswer === q.correct;
                if (isCorrect) {
                    score++;
                } else {
                    // Store question text instead of question ID
                    incorrectAnswers.push(q.text);
                }

                const correctClass = isCorrect ? 'correct' : 'incorrect';
                const statusIcon = isCorrect ? '✓' : '✗';

                reviewHTML += `
                    <div class="answer-item ${correctClass}">
                        <div class="answer-label">${statusIcon} ${q.text}</div>
                        <div class="your-answer">Your answer: ${userAnswer ? q.options[userAnswer] : 'Not answered'}</div>
                        ${!isCorrect ? `<div class="correct-answer">Correct answer: ${q.options[q.correct]}</div>` : ''}
                    </div>
                `;
            });

            const percentage = (score / totalQuestions) * 100;
            const passed = percentage >= 70;
            const passClass = passed ? 'pass' : 'fail';
            const userName = document.getElementById('userName').value;

            // Prepare data for Google Sheet submission
            const resultsData = {
                name: userName,
                score: score,
                percentage: percentage.toFixed(0),
                incorrectAnswers: incorrectAnswers.length > 0 ? incorrectAnswers.join(' | ') : 'None - Perfect Score!'
            };

            // Submit results to Google Sheet
            submitResultsToGoogleSheet(resultsData);

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="score ${passClass}">
                    <div style="font-size: 32px; margin-bottom: 10px;">${passed ? '🎉' : '📚'}</div>
                    <div>Your Score: ${score} / ${totalQuestions}</div>
                    <div style="font-size: 20px; margin-top: 10px;">${percentage.toFixed(0)}%</div>
                    <div style="font-size: 16px; margin-top: 10px; font-weight: normal;">
                        ${passed ? 'Congratulations! You passed!' : 'Keep learning! You need 70% to pass.'}
                    </div>
                    <div style="font-size: 14px; margin-top: 15px; padding-top: 15px; border-top: 2px solid rgba(0,0,0,0.1); font-weight: normal; opacity: 0.8;">
                        ✓ Your results have been submitted successfully
                    </div>
                </div>
                <div class="answer-review">
                    ${reviewHTML}
                </div>
                <button class="restart-btn" onclick="location.reload()">Restart Test</button>
            `;

            resultsDiv.classList.add('show');
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    </script>
